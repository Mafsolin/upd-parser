name: Release Windows builds

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Verify tag matches APP_VERSION
        shell: pwsh
        run: |
          $version = python -c "from app_version import APP_VERSION; print(APP_VERSION)"
          if ("v$version" -ne "${{ github.ref_name }}") {
            throw "Tag ${{ github.ref_name }} does not match APP_VERSION $version"
          }
          if ("${{ github.ref_name }}" -notmatch '^v\d+\.\d+\.\d+$') {
            throw "Release tag must use strict semver"
          }
      - name: Install dependencies
        run: python -m pip install -r requirements.txt -r requirements-build.txt
      - name: Run tests
        run: python -m unittest discover -s tests -v
      - name: Build one-file EXE
        run: python build_onefile_exe.py
      - name: Build portable version
        run: python build_portable.py
      - name: Package portable version
        shell: pwsh
        run: Compress-Archive -Path ../UPD_Parser_Portable/* -DestinationPath UPD_Parser_Portable.zip
      - name: Stage release assets
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path release-assets -Force | Out-Null
          Copy-Item ../UPD_Parser_OneFile/UPD_Parser.exe release-assets/UPD_Parser.exe
          Copy-Item UPD_Parser_Portable.zip release-assets/UPD_Parser_Portable.zip
      - name: Upload verified release assets
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: release-assets
          if-no-files-found: error
          path: release-assets/*

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download verified release assets
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: release-assets
          path: release-assets
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          generate_release_notes: true
          files: |
            release-assets/UPD_Parser.exe
            release-assets/UPD_Parser_Portable.zip
